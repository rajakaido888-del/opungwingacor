<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="google-site-verification" content="uZw6FJJXs6D0S0AkAfqC2LmKRH-Ji-ftfWlUPeQvKNE" />
  <title>Link Referral</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #052e16 0%, #14532d 40%, #166534 70%, #15803d 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* Bokeh circles background */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
    }
    body::before {
      width: 400px; height: 400px;
      background: #4ade80;
      top: -100px; left: -100px;
    }
    body::after {
      width: 350px; height: 350px;
      background: #86efac;
      bottom: -80px; right: -80px;
    }

    /* Share button top right */
    .top-share {
      position: absolute;
      top: 20px; right: 20px;
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 18px;
      color: #fff;
      transition: background 0.2s;
    }
    .top-share:hover { background: rgba(255,255,255,0.25); }

    /* Logo */
    .logo-wrap {
      margin-bottom: 16px;
      position: relative;
      display: inline-block;
    }

    .logo-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.4);
      overflow: hidden;
      background: #0f2d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      box-shadow: 0 0 30px rgba(74,222,128,0.4);
    }

    .logo-badge {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      background: #fbbf24;
      color: #1a1a1a;
      font-size: 10px;
      font-weight: 900;
      padding: 3px 12px;
      border-radius: 999px;
      white-space: nowrap;
      letter-spacing: 1px;
    }

    /* Title */
    .site-name {
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.4);
      margin-bottom: 10px;
      margin-top: 10px;
    }

    .site-desc {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      text-align: center;
      line-height: 1.7;
      max-width: 320px;
      margin-bottom: 36px;
    }

    /* Link button */
    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      padding: 14px 20px;
      text-decoration: none;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-align: center;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .link-btn:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    }

    .link-btn-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: #0f2d1a;
      border: 2px solid #fbbf24;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .link-btn-text { flex: 1; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 400px;
      margin: 28px 0 20px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.2);
    }
    .divider-text {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* Share buttons */
    .share-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }

    .share-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      width: 100%;
      max-width: 400px;
    }

    .share-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 14px;
      padding: 12px 8px;
      text-decoration: none;
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .share-btn:hover {
      background: rgba(255,255,255,0.22);
      transform: translateY(-3px);
    }
    .share-btn svg { width: 34px; height: 34px; }

    footer {
      margin-top: 40px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      text-align: center;
    }
  </style>
</head>
